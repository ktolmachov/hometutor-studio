      - app/eval_service.py — _run_single_eval_case / build_evaluators / metrics dict only
      - app/compare_eval.py — evaluators dict + report assembly only
      - eval_data/retrieval_regression.json — expected_sources shape (first/labeled cases)
      - tests/test_eval_retrieval_comparison.py — 1 recall@k test as pattern
    constraints:
      - Не удалять и не менять семантику recall@k / MRR / hit_rate (precision добавляется рядом)
      - faithfulness / answer_relevancy (LlamaIndex) остаются — answer_correctness дополняет, не заменяет
      - RAGAS как hard dependency запрещён; только optional backend за ENABLE_RAGAS_METRICS (default off)
      - answer_correctness считается только при наличии reference; иначе None (не штраф)
      - Никаких LLM-вызовов в precision@k/recall@k (чистая множественная метрика)
    kill_switch: >-
      precision/recall расходятся на одном fixture без объяснения; RAGAS-backend подтягивается
      при выключенном флаге; eval-стоимость удваивается; CI eval-gate краснеет на labeled subset.
    # Soft/validation dependency on wave-advanced-rag-rewrite-rerank is described in
    # north_star/notes (cross-wave, not a package-level blocker). depends_on lists item IDs only.
    depends_on: []
