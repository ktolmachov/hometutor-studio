      Sharp scope: recall@k already exists (app/eval_retrieval_comparison.py:21) — contract adds
      rank-aware precision + correctness-vs-reference only. Full human-readable contract:
      doc/next/ragas_retrieval_metrics_v1_contract.md. Accepted via generate_plan_next on
