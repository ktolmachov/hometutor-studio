# Backlog Registry (PoC)
#
# Purpose: structured, machine-readable index of backlog items. Replaces a
# plan_next Phase 2 re-derivation from prose (cjm.md + user_stories.md +
# tasklist.md § Deferred + future_roadmap.md) with one authoritative source.
#
# Source of truth for *automated decisions* is this file (backlog_registry.yaml).
# doc/tasklist.md § Now is a DERIVED display — generated by backlog_registry_lint.py,
# never read by pipeline scripts for decision-making.
# This registry is for *candidate selection* — what plan_next reaches for
# when backlog is empty or when Architect wants to inspect a deferred item.
#
# Lifecycle:
#   - proposed  = drafted / queued for promotion (no execution slot yet)
#   - ready     = owner-accepted next-up package (singleton slot — see Truth View invariant below)
#   - wip       = currently in tasklist § Now (singleton slot shared with ready — see below)
#   - deferred  = paused; re-entry condition must be set
#   - closed    = delivered; should move to doc/closed_iterations.md
#
# Truth View invariant (machine-enforced — scripts/roadmap_sync_check.py):
#   Across all top-level `items`, at most ONE package may be `ready` OR `wip` at a time.
#   Extra owner-approved work stays `proposed` (or `deferred`) until that slot is free.
#   Optional `active_package_id` (next to `active_wave_id`) mirrors that sole package id for
#   O(1) reads — auto-maintained by backlog_registry_lint.py --write-sync when valid.
#   Rationale: orchestration/autonomous pipelines resolve a single active package; multiple
#   `ready` rows break post-close sync and invite ambiguous package selection.
#
# When an item becomes wip → its full contract is written to tasklist.md
# (via generate_plan_next_prompt.md Phase 7). On closure, the item's row
# here is marked `closed` and a maintenance note goes to tasklist.md.
#
# Lint: python scripts/backlog_registry_lint.py
#
# Schema version 1 — keep minimal until consumers prove a larger shape.

schema_version: 2
user_stories_index: doc/user_stories_index.json
# active_wave_id: explicit override for active wave selection (null = auto: wip→ready→proposed)
active_wave_id: wave-advanced-rag-rewrite-rerank
# active_package_id: execution-focus package id — optional mirror of sole ready/wip row;
# auto-maintained by backlog_registry_lint.py --write-sync when registry is valid.
active_package_id: multi-query-expansion-v1

# ─── Wave Planning (schema v2) ────────────────────────────────────────────────
# Waves are the primary planning unit. Each wave bundles 1–4 related packages
# with a shared north_star metric and kill_switch. Ranking in plan-next operates
# at the wave level (Phase 3 wave-ranking formula). After the first package of a
# wave closes, run_autonomous.py::post_agent auto-promotes the next package.
#
# Lifecycle: proposed → ready → wip → completed | frozen
#   wip     = one package active in tasklist § Now; others queued
#   frozen  = kill_switch triggered; owner decides resume vs cancel
#
# wave_synergy_score = min(5, n_unique_us * 0.8 + shared_read_files * 0.4)
# mot_recency_gap: days since entry_mot last touched; ≥14d → 5, 7d → 3, <3d → 1

