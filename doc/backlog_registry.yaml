    user_stories: ["US-1.2"]
    impact: loop-improvement
    blocks: >-
      Fix retrieval service re-initialization on every request. Log 2026-05-24 (both
      sessions) confirms "Initializing retrieval base services..." fires on every /topics
      call and twice at startup (uvicorn process + Streamlit process). Service must be a
      proper startup singleton via FastAPI lifespan. Chroma "collection does not exist"
      must short-circuit in < 10ms after first check (cached negative result, not
      re-checked each request). Additional finding from session 2: intermittent /topics
      1023ms spike after 46s idle (08:44:55) while other calls took 11-13ms — likely
      some lazy re-check or GC triggered on first request after idle; investigate and
      fix with singleton. Bootstrap async probe: LLM health probe must be non-blocking
      (parallel, 1s connect timeout) so /ui/bootstrap returns < 2s even when local LLM
      is slow. Measured baselines: bootstrap 5046ms (session 1), 3937ms (session 2 after
      env fix — 1s improvement from removing LLM alias overhead); target 800ms.
      SSR semantic cache: loads 35s after startup in session 2 (was 20s in session 1).
      Add eager warmup in lifespan startup so first SSR request is not cold.
