      - '.\.venv\Scripts\python.exe -c "assert round(__import__(''app.eval_retrieval_comparison'', fromlist=[''calculate_precision_at_k'']).calculate_precision_at_k({''a''}, [''a'',''b''], 2), 9) == 0.5"'
      - '.\.venv\Scripts\python.exe scripts\check_readset.py app/eval_retrieval_comparison.py app/eval_service.py'
    read_set_hint:
