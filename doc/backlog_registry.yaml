    user_stories: []
    impact: loop-improvement
    priority: P1
    cost_estimate: S
    write_set_max: 3
    north_star: >-
      Пользователь открывает topics tab и видит badge «конспект готов» рядом с уроком,
      для которого в data/<course>/ существует .md с frontmatter type=konspekt и
      matching source-полем. Может скачать/открыть одной кнопкой. Никакого fuzzy-match —
      только чтение фронтматера. Fallback на обычный экспорт сохранён.
    preconditions:
      - >-
        data/ИИ Агенты/ содержит готовые конспекты уроков 1–4, все с YAML frontmatter
        type: konspekt и полями source, presentation, generated, tags.
        Пример (урок 4): source: "Урок 4 Катим в прод- надежность.txt",
        presentation: "Урок №4 — AI-агенты.pdf", generated: 2026-06-10.
      - Current txt export remains the default fallback and must not be refactored.
    deliverables:
      - >-
        app/konspekt_discovery.py — scan data/<course>/*.md, parse YAML frontmatter
        (between first ---/--- pair), return list[KonspektMeta] where type==konspekt;
        KonspektMeta: path, source, presentation, generated, tags.
        Match to topics tab entry by normalizing source field vs. topic source filename
        (strip path, lower, collapse whitespace). No fuzzy matching beyond that.
        Also expose: coverage_summary(course_docs) → CoverageSummary(covered, total, pct).
      - >-
        app/ui/topics_tab_right_column.py — для каждого документа в списке вызвать
        konspekt_discovery; если найден — показать badge «конспект готов [дата]» и
        кнопку «Скачать конспект»; если нет — обычный экспорт без изменений.
      - >-
        app/ui/topics_tab.py — кнопка «Весь курс → Obsidian» перед запуском проверяет
        coverage_summary; если pct == 100% — кнопку скрыть, показать
        «✅ Все конспекты готовы»; если pct > 0% — показать предупреждение
        «N документов уже имеют конспект — будет обработано M»
        и пропустить покрытые файлы в render_obsidian_course_batch.
        render_obsidian_course_batch получает skip_with_konspekt=True по умолчанию.
      - >-
        tests/test_konspekt_discovery.py — frontmatter parse, source match, no-match,
        wrong-course isolation, missing/malformed frontmatter graceful skip,
        coverage_summary full/partial/zero coverage variants.
    dod_commands:
      - '.\.venv\Scripts\python.exe -m pytest tests/test_konspekt_discovery.py -q --tb=short'
      - '.\.venv\Scripts\python.exe scripts\check_readset.py app/konspekt_discovery.py app/ui/topics_tab_right_column.py app/ui/topics_tab.py tests/test_konspekt_discovery.py'
