      - Frontmatter parse: only between first ---/--- block; skip file if malformed
      - Wrong match is worse than no match — require source field equality after normalization
      - User must be able to force-run txt export even when konspekt exists (opt-in override)
      - render_obsidian_course_batch поведение при skip_with_konspekt=False не меняется
    kill_switch: >-
      Badge shows file with wrong source; frontmatter parse throws on malformed YAML;
      «Весь курс» запускает export для документов с готовым конспектом без явного override;
      txt export regressions appear in targeted tests.
