        по образцу calculate_recall_at_k; RetrievalModeResult.precision_at_k + report wiring
      - >-
        app/eval_service.py — answer_correctness metric (semantic similarity к reference) в case-result
        metrics, скип при отсутствии reference; без замены faithfulness/answer_relevancy
      - >-
        app/compare_eval.py — пробрасывает context_precision + answer_correctness в сравнительный отчёт
      - >-
        eval_data/retrieval_regression.json — labeled subset (≥10 кейсов) с непустыми expected_sources;
        eval_data/eval_questions.json — reference добавлен к части кейсов
      - >-
        app/config.py — ENABLE_RAGAS_METRICS флаг (default False); опциональный ragas-backend подключается
        только при флаге, отсутствие пакета не ломает harness (graceful import guard)
      - tests — targeted coverage для precision@k, context_precision, answer_correctness и флаг-гейта
    dod_commands:
