      2026-06-10 (rescope 1): cloud pipeline доказан, уроки 1–4 готовы в data/.
      HTML-import superseded. Переориентирован на discovery по frontmatter + badge в UI.
      2026-06-10 (rescope 2): discovery переведён на чтение YAML frontmatter
      (type: konspekt + source field) вместо fuzzy filename matching. Все 4 конспекта
