id: scenario_06
title: "SRS: повторение по интервальному алгоритму"
level: "🟠 Retention engine"
persona: "Аня через 3 дня. Получила напоминание — пора повторить."
duration_min: 4
why: |
  Система сама знает, когда карточки пора повторить (SM-2 алгоритм).
  Аня видит бейдж «К повторению: 12», открывает очередь,
  оценивает карточки — система обновляет расписание автоматически.
requires:
  openai_api_key: false
  offline_friendly: true
  e2e_env:
    HOME_RAG_E2E_OFFLINE: "1"
wow_moment: |
  Система сама отслеживает что и когда повторять.
  Аня не думает «надо бы повторить» — бейдж говорит за неё.
takeaway: |
  Не надо вспоминать, что учил. Система помнит и сама напоминает.
scenario_link: "user_scenarios.md#сценарий-6--srs-повторение"

shots:
  - slug: "01_home_due_badge"
    caption: "Бейдж «К повторению» на главном экране"
    narration: "Аня заходит — система уже знает: 12 карточек пора повторить."
    duration_sec: 3
  - slug: "02_review_queue_opened"
    caption: "Очередь повторения открыта: верхняя карточка"
    narration: "Одна карточка за раз — без перегрузки."
    duration_sec: 3
  - slug: "03_card_flipped_answer"
    caption: "Карточка раскрыта: ответ + 4 кнопки SM-2"
    narration: "Оцени насколько помнишь: от «Забыл» до «Легко»."
    duration_sec: 4
  - slug: "04_grade_selected_state_update"
    caption: "Оценка выбрана — карточка уходит из очереди"
    narration: "Выбрал «Хорошо» — карточка переносится на +4 дня."
    duration_sec: 3
  - slug: "05_queue_progress"
    caption: "Прогресс очереди: «11 осталось, ~4 мин»"
    narration: "Видно сколько осталось и когда закончишь — не бесконечный список."
    duration_sec: 3
