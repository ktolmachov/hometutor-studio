id: scenario_22
title: "Умный Маршрутизатор с ИИ: 5 уровней AI Vision"
level: "🧭 Vision"
persona: "Product demo: показать следующий уровень SSR без обещания, что все AI-уровни уже включены."
duration_min: 2
why: |
  Показать следующий ход из слайда 7: текущий deterministic router остаётся
  надёжной базой, а поверх него постепенно включаются МО-персонализация,
  LLM-объяснения, недельный план, граф prerequisites и feedback loop.
requires:
  openai_api_key: false
  offline_friendly: true
wow_moment: |
  Роутер перестаёт быть «умным будильником» и становится персональным учебным
  проводником: он знает, что повторить сейчас, что отложить и почему следующая
  тема зависит от предыдущей.
takeaway: |
  SSR AI Vision — это не отдельный чат-бот, а следующий слой над учебным циклом:
  правила дают предсказуемость, МО даёт персонализацию, LLM даёт понятное объяснение.
scenario_link: "user_scenarios.md#сценарий-22--умный-маршрутизатор-с-ии-5-уровней-ai-vision"

shots:
  - slug: "01_ai_vision_overview"
    caption: "AI Vision: от правил к персональному проводнику"
    narration: "Базовый SSR остаётся страховочной сеткой, а AI-уровни добавляются поверх него."
    duration_sec: 4
  - slug: "02_levels_1_2_personal_memory"
    caption: "Уровни 1–2: локальная память + живое объяснение"
    narration: "ML меняет приоритеты по кривой забывания, LLM объясняет решение человеческим языком."
    duration_sec: 5
  - slug: "03_levels_3_4_planner_graph"
    caption: "Уровни 3–4: недельный план + граф prerequisites"
    narration: "Система ведёт дальше одного клика и не предлагает сложную тему раньше базовой."
    duration_sec: 5
  - slug: "04_level_5_feedback_loop"
    caption: "Уровень 5: feedback loop"
    narration: "Если пользователь отклоняет рекомендации, стратегия меняется и остаётся объяснимой."
    duration_sec: 4
