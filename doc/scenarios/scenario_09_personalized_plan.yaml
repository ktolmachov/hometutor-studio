id: scenario_09
title: "Персональный план обучения"
level: "🔴 Orchestration"
persona: "Аня в начале недели. Хочет понять что учить на этой неделе."
duration_min: 5
why: |
  Система строит персональный план на неделю на основе weak spots,
  истории сессий и целей. Аня видит не просто список тем,
  а приоритеты с объяснением «Почему здесь» и CTA на сегодня.
requires:
  openai_api_key: false
  offline_friendly: true
  e2e_env:
    HOME_RAG_E2E_OFFLINE: "1"
wow_moment: |
  «Сегодня: разобрать X (8 мин)» — система знает твой темп
  и строит план под него, а не под идеального студента.
takeaway: |
  Персональный план — это не расписание, а живой маршрут.
  Он меняется с твоим прогрессом, без ручной настройки.
scenario_link: "user_scenarios.md#сценарий-9--персональный-план"

shots:
  - slug: "01_plan_overview"
    caption: "Обзор плана на неделю: 3 приоритетные темы"
    narration: "Система отобрала три темы — не весь учебник, а именно эти."
    duration_sec: 4
  - slug: "02_plan_derived_from_gaps"
    caption: "«Почему здесь»: weak spot по каждой теме"
    narration: "Не просто список — объяснение почему эта тема приоритетна."
    duration_sec: 4
  - slug: "03_plan_diff_since_last"
    caption: "Diff с прошлой сессией: что изменилось"
    narration: "План живёт вместе с прогрессом — обновился с последней сессии."
    duration_sec: 3
  - slug: "04_plan_today_action"
    caption: "«Сегодня: разобрать X (8 мин)»"
    narration: "Одно действие на сегодня — не список на неделю вперёд."
    duration_sec: 3
  - slug: "05_plan_accepts_adjust"
    caption: "Корректировка приоритета → пересчёт плана"
    narration: "Сдвинула тему вниз — план пересчитался мгновенно."
    duration_sec: 4
