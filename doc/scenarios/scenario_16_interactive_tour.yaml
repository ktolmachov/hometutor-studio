why: |
  Показать guided onboarding: overlay с главами, шагами внутри главы и возобновление тура
  после перезагрузки страницы.
requires:
  openai_api_key: false
  offline_friendly: true
wow_moment: |
  Лента «Тур: глава N из 5» и кнопка «Продолжить тур» после reload — доказательство persistence.
takeaway: |
  Онбординг не одноразовый экран: это сопровождение с прогрессом между сессиями.
scenario_link: "user_scenarios.md#сценарий-16--интерактивный-тур-5-глав"

