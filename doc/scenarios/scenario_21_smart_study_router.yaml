id: scenario_21
title: "Умный Маршрутизатор: один лучший следующий шаг"
level: "🔴 Orchestration"
persona: "Аня открыла приложение утром и хочет понять, что делать сейчас."
duration_min: 1
why: |
  Показать killer-фичу из слайда 6: система не оставляет пользователя перед
  набором режимов, а предлагает один лучший следующий шаг, объясняет
  «почему сейчас» и оставляет безопасные альтернативы.
requires:
  openai_api_key: false
  offline_friendly: true
  e2e_env:
    HOME_RAG_E2E_OFFLINE: "1"
wow_moment: |
  «Сейчас важнее...» — продукт превращается из набора вкладок в когнитивный
  автопилот: следующий шаг виден сразу, причина читается человеческим языком.
takeaway: |
  Умный Маршрутизатор снижает когнитивную нагрузку выбора: пользователь видит
  маршрут, причину и CTA вместо ручного перебора режимов.
scenario_link: "user_scenarios.md#сценарий-21--умный-маршрутизатор-один-лучший-следующий-шаг"

shots:
  - slug: "01_smart_study_router_card"
    caption: "Умный помощник: следующий шаг с объяснением"
    narration: "Система рекомендует один лучший следующий шаг и объясняет, почему именно сейчас."
    duration_sec: 4
  - slug: "02_router_reason_and_alternatives"
    caption: "Почему сейчас + безопасные альтернативы"
    narration: "Главная CTA не прячет другие маршруты: быстрый ответ, тьютор, quiz и прогресс остаются рядом."
    duration_sec: 4
  - slug: "03_router_trace_open"
    caption: "Краткий след решения роутера"
    narration: "Пользователь может раскрыть, какие локальные сигналы стояли за рекомендацией."
    duration_sec: 3
