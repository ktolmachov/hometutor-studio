id: scenario_32
title: "Публичное демо на HF Spaces: без установки и без своего LLM"
level: "🟢 Первые шаги"
persona: "Лена нашла ссылку на публичный Space и хочет попробовать без установки чего-либо на свой компьютер."
duration_min: 2
why: |
  Показать, что hometutor можно попробовать за пару минут на публичной ссылке
  Hugging Face Spaces: не нужно ставить Python, LM Studio или собирать индекс —
  всё уже развёрнуто и работает на предзагруженном демо-корпусе.
requires:
  openai_api_key: false
  offline_friendly: true
  e2e_env:
    HOME_RAG_E2E_OFFLINE: "1"
  notes: |
    Реальная конфигурация: deploy/hf-spaces (Docker SDK), AUTH_ENABLED=true (по README),
    demo_data/ + demo_chroma_db/ копируются в рабочие data/ при старте контейнера
    (bootstrap_demo_paths.sh), облачный LLM-провайдер. НЕТ отдельного "guest mode" или
    DEMO_MODE=true флага — посетитель проходит обычную быструю регистрацию
    (email/пароль), после чего видит уже готовый демо-курс. Т.к. диск контейнера
    эфемерный, аккаунт может не пережить рестарт Space — это документированное
    ограничение демо, не баг.
wow_moment: |
  Ни одной команды в терминале, ни одного локального сервера: за пару минут после
  открытия ссылки и короткой регистрации Лена уже задаёт вопросы по предзагруженному
  курсу и видит ответы с источниками.
takeaway: |
  Публичная витрина — не замена local-first дома, а входной билет: попробовать
  можно без установки; данные и приватность остаются архитектурой локального режима.
scenario_link: "user_scenarios.md#сценарий-32--публичное-демо-на-hf-spaces-без-установки-и-без-своего-llm"

shots:
