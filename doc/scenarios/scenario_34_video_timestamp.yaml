id: scenario_34
title: "Возврат в таймкод видео: контекст без пересмотра"
level: "🟠 Retention engine"
persona: "Марк смотрел лекцию, прервался на 23:15. Хочет продолжить с того же места, но без перемотки всего видео."
duration_min: 3
why: |
  Учебное видео с таймкодами — частый формат. hometutor сохраняет позицию
  последнего просмотра и предлагает продолжить с точного таймкода,
  показывая конспект пройденного и ready-to-answer контекст.
requires:
  openai_api_key: false
  offline_friendly: true
  e2e_env:
    HOME_RAG_E2E_OFFLINE: "1"
  notes: |
    Таймкод-позиция сохраняется в learner state. UI: resume-карта с таймкодом + краткий
    конспект предыдущего фрагмента. Не требует реального видео-плеера: мок через
    маркер таймкода в user-state. Capture pending: нужна имплементация UI resume-карты
    для видео.
wow_moment: |
  «Продолжить с 23:15» — не просто ссылка на видео, а конспект того,
  что было до таймкода, и готовность ответить на вопросы по просмотренному.
takeaway: |
  Учебное видео не теряется в «посмотрю потом»: таймкод + конспект +
  контекст вопросов = возврат без пересмотра.
scenario_link: "user_scenarios.md#сценарий-34--возврат-в-таймкод-видео"

shots:
  - slug: "01_video_session_started"
    caption: "Старт видео-сессии: плеер + конспект"
    narration: "Пользователь открывает лекцию; система фиксирует таймкод 00:00."
    duration_sec: 4
  - slug: "02_interrupted_session_state"
    caption: "Сессия прервана: таймкод 23:15 сохранён"
    narration: "После выхода learner state хранит позицию — 23:15, тема, ключевые тезисы."
    duration_sec: 3
  - slug: "03_resume_video_card"
    caption: "Resume-карта с таймкодом на главном экране"
    narration: "При возврате — «Продолжить с 23:15» + конспект 3–5 ключевых тезисов."
    duration_sec: 4
  - slug: "04_qa_after_video_segment"
    caption: "Контекст готов: вопросы по просмотренному фрагменту"
    narration: "Система знает, о чём был фрагмент, и может ответить на вопросы."
    duration_sec: 3
