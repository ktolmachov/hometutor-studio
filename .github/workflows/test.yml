name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install hometutor (pinned)
        run: pip install "hometutor[telegram] @ git+https://github.com/ktolmachov/hometutor.git@fffeecb9a21c5afb5a48b46e4e12bfc34392eb48"
      - name: Install studio deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -q
