name: Graph Expansion Smoke Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: graph-expansion-smoke-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-gate:
    name: Graph Expansion Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run graph expansion gate tests
        run: |
          python -m pytest \
            tests/test_metrics.py \
            tests/test_graph_expansion_benchmark.py \
            tests/test_check_graph_expansion_gate.py \
            tests/test_smoke_graph_expansion_gate.py \
            tests/test_graph_expansion_compare.py \
            tests/test_smoke_graph_expansion_compare.py \
            -q

      - name: Run smoke graph expansion merge-gate
        run: |
          python scripts/smoke_graph_expansion_gate.py \
            --jsonl-out logs/graph_expansion_smoke_ci.jsonl \
            --profile strict \
            --json-out

      - name: Run targeted graph compare merge-gate
        run: |
          python scripts/smoke_graph_expansion_compare.py \
            --out-dir logs \
            --preset synthesis-strict \
            --enforce-gate \
            --json-out

      - name: Upload smoke gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graph-expansion-smoke-gate
          path: |
            logs/graph_expansion_smoke_ci.jsonl
            logs/graph_expansion_smoke_off.jsonl
            logs/graph_expansion_smoke_on.jsonl
          if-no-files-found: ignore
