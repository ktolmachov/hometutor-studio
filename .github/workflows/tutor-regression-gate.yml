name: Tutor Regression Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: tutor-regression-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-gate:
    name: Tutor Regression Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tutor gate tests
        run: |
          python -m pytest \
            tests/test_check_tutor_regression_gate.py \
            tests/test_smoke_tutor_regression_gate.py \
            -q

      - name: Run tutor smoke merge-gate (healthy)
        run: |
          python scripts/smoke_tutor_regression_gate.py \
            --mode healthy \
            --json-out > tutor-smoke-healthy.json
          cat tutor-smoke-healthy.json

      - name: Run tutor smoke control (degraded)
        run: |
          python scripts/smoke_tutor_regression_gate.py \
            --mode degraded \
            --json-out > tutor-smoke-degraded.json
          cat tutor-smoke-degraded.json

      - name: Build standalone gate artifact JSON
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          pairs = [
              ("tutor-smoke-healthy.json", "tutor-gate-healthy.json"),
              ("tutor-smoke-degraded.json", "tutor-gate-degraded.json"),
          ]
          for src_name, dst_name in pairs:
              src = Path(src_name)
              if not src.exists():
                  continue
              payload = json.loads(src.read_text(encoding="utf-8"))
              gate = payload.get("gate")
              if isinstance(gate, dict):
                  Path(dst_name).write_text(
                      json.dumps(gate, ensure_ascii=False, indent=2),
                      encoding="utf-8",
                  )
          PY

      - name: Upload tutor gate/smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tutor-regression-gate-artifacts
          if-no-files-found: warn
          retention-days: 14
          path: |
            tutor-smoke-healthy.json
            tutor-smoke-degraded.json
            tutor-gate-healthy.json
            tutor-gate-degraded.json

      - name: Print gate diagnostic summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def load_report(path_str):
              path = Path(path_str)
              if not path.exists():
                  return {"name": path_str, "missing": True}
              data = json.loads(path.read_text(encoding="utf-8"))
              diag = data.get("diagnostic_summary") or {}
              gate = data.get("gate") or {}
              triage = gate.get("triage") if isinstance(gate.get("triage"), dict) else {}
              return {
                  "name": path_str,
                  "missing": False,
                  "result_label": diag.get("result_label"),
                  "gate_status": diag.get("gate_status", gate.get("status")),
                  "gate_error_kind": diag.get("gate_error_kind", gate.get("error_kind")),
                  "expected_rc": diag.get("expected_rc"),
                  "actual_rc": diag.get("actual_rc"),
                  "expectation_matched": diag.get("expectation_matched"),
                  "next_action": triage.get("next_action") or diag.get("recommended_next_action"),
                  "owner_hint": triage.get("owner_hint") or diag.get("recommended_owner_hint"),
                  "rerun_recommended": triage.get("rerun_recommended") if triage.get("rerun_recommended") is not None else diag.get("rerun_recommended"),
              }

          reports = [
              ("healthy", load_report("tutor-smoke-healthy.json")),
              ("degraded", load_report("tutor-smoke-degraded.json")),
          ]
          lines = ["# Tutor Regression Smoke Summary", ""]
          artifact_names = [
              "tutor-smoke-healthy.json",
              "tutor-smoke-degraded.json",
              "tutor-gate-healthy.json",
              "tutor-gate-degraded.json",
          ]
          lines.append("## Artifacts")
          lines.append("- artifact bundle: `tutor-regression-gate-artifacts`")
          for name in artifact_names:
              lines.append(f"- file: `{name}`")
          lines.append("")
          lines.append("## Diagnostic")
          for label, report in reports:
              if report["missing"]:
                  print(f"{label}: report missing")
                  lines.append(f"- `{label}`: report missing")
                  continue
              print(
                  f"{label}: result={report['result_label']} "
                  f"status={report['gate_status']} "
                  f"error_kind={report['gate_error_kind']} "
                  f"next_action={report['next_action']} "
                  f"owner_hint={report['owner_hint']} "
                  f"rerun_recommended={report['rerun_recommended']} "
                  f"expected_rc={report['expected_rc']} actual_rc={report['actual_rc']} "
                  f"matched={report['expectation_matched']}"
              )
              lines.append(
                  f"- `{label}`: `{report['result_label']}`; "
                  f"`status={report['gate_status']}`; "
                  f"`error_kind={report['gate_error_kind']}`; "
                  f"`next_action={report['next_action']}`; "
                  f"`owner_hint={report['owner_hint']}`; "
                  f"`rerun_recommended={report['rerun_recommended']}`; "
                  f"`expected_rc={report['expected_rc']}` / `actual_rc={report['actual_rc']}`; "
                  f"`matched={report['expectation_matched']}`"
              )

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              Path(summary_path).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
