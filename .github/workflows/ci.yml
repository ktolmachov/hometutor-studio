name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff pytest

      - name: Lint
        run: python -m ruff check app tests

      - name: Run focused tests
        env:
          HOME_RAG_MICRO_QUIZ_OFFLINE: "1"
          OPENAI_API_KEY: test-key
        run: |
          python -m pytest tests/test_api.py tests/test_provider.py tests/test_defense_eval_dataset.py -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: home-rag:ci

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        if: secrets.VPS_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd home-rag_v2
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
