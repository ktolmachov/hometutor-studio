[pytest]
# Запуск: если в окружении заданы PYTHONPATH и/или PYTHONHOME на другую установку
# Python (например 3.14), возможен «SRE module mismatch» при импорте stdlib.
# Флаг -E у родительского pytest не убирает эти переменные из os.environ — дочерние
# subprocess их наследуют. Перед прогоном удалите их из процесса, например:
#   PowerShell:  Remove-Item Env:PYTHONHOME, Env:PYTHONPATH -ErrorAction SilentlyContinue
#   или в комбинации с игнорированием PYTHON* у интерпретатора:
#               .\.venv\Scripts\python.exe -E -m pytest ...
markers =
    integration: медленные тесты с реальным mini-index, OPENAI_API_KEY и эмбеддингами (US-12.3)
# По умолчанию без integration (сеть, ключи, build_index). Запуск: см. README / scripts/run_integration_local.ps1
addopts = -m "not integration"
